apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ecommerce-dev

bases:
  - ../../base/database
  - ../../base/backend
  - ../../base/frontend

resources:
  - ingress.yaml
  - namespace.yaml

patchesStrategicMerge:
  # backend-patch.yaml removed - using Rollout instead of Deployment
  - frontend-patch.yaml

# Secret generators - secrets are loaded from .env files
# Copy secrets.env.example to secrets.env and fill in your values
secretGenerator:
  - name: backend-secret
    envs:
      - secrets.env
    options:
      disableNameSuffixHash: true

# ConfigMap generators - for frontend configuration
configMapGenerator:
  - name: frontend-config
    envs:
      - frontend-secrets.env
    options:
      disableNameSuffixHash: true
    behavior: merge

images:
  - name: ecommerce-backend
    newName: ghcr.io/emil-ep/argo-app/backend
    newTag: v1.0.13
  - name: ecommerce-frontend
    newName: ghcr.io/emil-ep/argo-app/frontend
    newTag: v1.0.13

# Note: commonLabels removed to avoid conflicts with Argo Rollouts
# Argo Rollouts validates that service selectors match rollout selectors
# commonLabels would add environment: dev to rollout selector, causing mismatch

# Made with Bob
