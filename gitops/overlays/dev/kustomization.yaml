apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ecommerce-dev

bases:
  - ../../base/database
  - ../../base/backend
  - ../../base/frontend

resources:
  - ingress.yaml

patchesStrategicMerge:
  # backend-patch.yaml removed - using Rollout instead of Deployment
  - frontend-patch.yaml

# Note: Secret and ConfigMap generators removed
# Secrets and ConfigMaps are now managed directly in Kubernetes
# Use kubectl to create/update them:
#   kubectl create secret generic backend-secret --from-env-file=secrets.env -n ecommerce-dev
#   kubectl create configmap frontend-config --from-env-file=frontend-secrets.env -n ecommerce-dev

images:
  - name: ecommerce-backend
    newName: ghcr.io/emil-ep/argo-app/backend
    newTag: v1.0.22
  - name: ecommerce-frontend
    newName: ghcr.io/emil-ep/argo-app/frontend
    newTag: v1.0.22

# Note: commonLabels removed to avoid conflicts with Argo Rollouts
# Argo Rollouts validates that service selectors match rollout selectors
# commonLabels would add environment: dev to rollout selector, causing mismatch
