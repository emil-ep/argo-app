apiVersion: v1
kind: ConfigMap
metadata:
  name: argo-rollouts-config
  namespace: argo-rollouts
data:
  # Metric plugins tell the Argo Rollouts controller which external binary to
  # use when evaluating AnalysisTemplate metrics of type `plugin`.
  #
  # HOW IT WORKS
  # ------------
  # On startup (or restart), the Argo Rollouts controller reads this ConfigMap,
  # downloads the binary from `location`, verifies it against `sha256`, and
  # caches it locally. Every AnalysisRun that references:
  #
  #   provider:
  #     plugin:
  #       instana/metrics: ...
  #
  # ...will invoke this binary to query Instana for metrics on the canary pods
  # before each promotion step.
  #
  # UPDATING THE VERSION
  # --------------------
  # 1. Find the latest release at:
  #    https://github.com/emil-ep/rollouts-plugin-metric-instana/releases
  # 2. Get the sha256 from the SHA256SUMS file attached to the release.
  # 3. Update `location` and `sha256` below.
  # 4. Restart the controller to pick up the new binary:
  #    kubectl rollout restart deployment/argo-rollouts -n argo-rollouts
  #
  metricProviderPlugins: |-
    - name: "instana/metrics"
      location: "https://github.com/emil-ep/rollouts-plugin-metric-instana/releases/download/v0.0.1/rollouts-plugin-metric-instana_0.0.1_linux_amd64"
      sha256: "9bb0243d566ad139f73346d2fcd3d9dc36dd3299c79c2d8079b69fcce8fb95dd"
