apiVersion: v1
kind: ConfigMap
metadata:
  name: argo-rollouts-config
  namespace: argo-rollouts
data:
  # Metric plugins tell the Argo Rollouts controller which external binary to
  # use when evaluating AnalysisTemplate metrics of type `plugin`.
  #
  # HOW IT WORKS
  # ------------
  # On startup (or restart), the Argo Rollouts controller reads this ConfigMap,
  # downloads the binary from `location`, verifies it against `sha256`, and
  # caches it locally. Every AnalysisRun that references:
  #
  #   provider:
  #     plugin:
  #       instana/rollouts-plugin: ...
  #
  # ...will invoke this binary to query Instana for error-rate metrics on the
  # canary pods before each promotion step.
  #
  # UPDATING THE VERSION
  # --------------------
  # 1. Find the latest release at:
  #    https://github.com/emil-ep/instana-argo-metric-plugin/releases
  # 2. Download the linux-amd64 binary and compute its sha256:
  #    curl -sLO <download-url> && sha256sum instana-rollouts-plugin-linux-amd64
  # 3. Update `version`, `location`, and `sha256` below.
  # 4. Restart the controller to pick up the new binary:
  #    kubectl rollout restart deployment/argo-rollouts -n argo-rollouts
  #
  metricProviderPlugins: |-
    - name: "instana/rollouts-plugin"
      version: "v0.1.3"
      location: "https://github.com/emil-ep/instana-argo-metric-plugin/releases/download/v0.1.3/instana-rollouts-plugin-linux-amd64"
      sha256: "6d50c3d8471415bc029b4526d6c6e26d38cb626d1a5b87735876233fce73c6bf"
