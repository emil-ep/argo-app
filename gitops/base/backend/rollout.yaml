apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: backend
  labels:
    app: backend
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ecommerce
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: backend
      app.kubernetes.io/name: backend
      app.kubernetes.io/component: api
      app.kubernetes.io/part-of: ecommerce
  
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: ecommerce
        component: api
    spec:
      containers:
      - name: backend
        image: ecommerce-backend
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3000"
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: database.host
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: database.port
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: database.name
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: database.user
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: database.password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: jwt.secret
        - name: CORS_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: cors.origin
        - name: INSTANA_ENABLED
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: instana.enabled
        - name: INSTANA_AGENT_HOST
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: instana.agent.host
        - name: INSTANA_AGENT_PORT
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: instana.agent.port
        - name: INSTANA_AGENT_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: instana.agent.key
        - name: INSTANA_SERVICE_NAME
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: instana.service.name
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
  
  # Canary Strategy
  strategy:
    canary:
      # Service references for traffic routing
      canaryService: backend-canary
      stableService: backend-stable

      # Number of pods to run for canary
      canaryReplicas: 1

      # Steps — analysis is an inline step (index 2) so it runs after the canary
      # pod is live and has served traffic through the first pause.
      steps:
      # Index 0 — deploy 1 canary pod at 20% weight
      - setWeight: 20
      # Index 1 — let the canary serve real traffic before measuring
      - pause: {duration: 2m}
      # Index 2 — run Instana analysis; only promote if error-rate stays < 5%
      - analysis:
          templates:
          - templateName: instana-error-rate
          args:
          - name: service-name
            value: ecommerce-backend
          # instana-server-url and instana-api-token are resolved from the
          # instana-credentials secret inside the AnalysisTemplate itself.
          - name: canary-pod-hash
            valueFrom:
              podTemplateHashValue: Latest
      # Index 3 — promote to 40%
      - setWeight: 40
      - pause: {duration: 2m}
      # Index 5 — promote to 60%
      - setWeight: 60
      - pause: {duration: 2m}
      # Index 7 — promote to 80%
      - setWeight: 80
      - pause: {duration: 2m}
      # Index 9 — full rollout
      - setWeight: 100

