apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: instana-error-rate
spec:
  args:
    # Credentials are resolved directly from the secret by the controller at
    # measurement time. Do NOT pass these from the Rollout step args — Argo
    # Rollouts does not resolve secretKeyRef when creating an AnalysisRun from
    # a canary steps[].analysis block.
    - name: instana-server-url
      valueFrom:
        secretKeyRef:
          name: instana-credentials
          key: serverUrl
    - name: instana-api-token
      valueFrom:
        secretKeyRef:
          name: instana-credentials
          key: apiToken
    # clusterName must be supplied by the Rollout — Kubernetes does not expose
    # the cluster name inside the cluster, so there is no automatic valueFrom.
    - name: cluster-name
    # namespace-name is NOT declared here — fieldRef is not supported in
    # AnalysisTemplate args. The plugin reads it directly from the AnalysisRun's
    # own ObjectMeta (analysisRun.Namespace) as a built-in fallback.
    # canary-pod-hash is injected automatically by Argo Rollouts from the
    # rollouts-pod-template-hash label; it isolates the query to canary pods only.
    - name: canary-pod-hash
  metrics:
    - name: error-rate
      # Measure every 30 seconds
      interval: 30s
      # Require 3 consecutive successful measurements before promoting
      count: 3
      # Promote if error rate stays below 5%
      successCondition: result < 5.0
      # Roll back if error rate is 5% or above
      failureCondition: result >= 5.0
      # Allow up to 1 consecutive measurement error (network glitch, etc.) before failing
      consecutiveErrorLimit: 1
      provider:
        plugin:
          instana/rollouts-plugin:
            serverUrl: "{{args.instana-server-url}}"
            apiToken: "{{args.instana-api-token}}"
            clusterName: "{{args.cluster-name}}"
            # namespaceName is omitted — the plugin falls back to analysisRun.Namespace
            # Isolates the metric query to the canary replica set only.
            # Remove this field if you want to measure all pods.
            canaryPodHash: "{{args.canary-pod-hash}}"
            # Look back 60 seconds for each measurement
            windowSize: 60
            # Return the error-rate percentage (0-100); can also be "calls" or "errors"
            metricType: errorRate

# Made with Bob
