apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  labels:
    app: backend
    component: api
data:
  # Database configuration
  database.host: "postgres"
  database.port: "5432"
  database.name: "ecommerce"
  
  # CORS configuration - Allow all origins (use specific domains in production)
  cors.origin: "*"

  # Instana server URL for the Rollouts AnalysisTemplate
  # Value is empty here — install.sh patches this at deploy time from secrets.env
  # (the URL of the Instana backend API, e.g. https://<unit>.instana.io)
  instana.server.url: ""

  # Rate limiting
  rate.limit.window: "900000"
  rate.limit.max: "100"
  
  # Instana configuration
  instana.enabled: "true"
  # instana.agent.host and instana.agent.port are now configured via secrets
  instana.service.name: "ecommerce-backend"

