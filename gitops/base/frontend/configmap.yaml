apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  labels:
    app: frontend
    component: ui
data:
  # Full URL to access backend through Ingress (Traefik on port 80)
  # Frontend and backend are behind the same ingress (ecommerce-dev.local)
  # Frontend at / and backend at /api
  api.url: "http://ecommerce-dev.local"
  
  # Instana End User Monitoring (EUM) configuration
  # This key should be updated via kubectl or in your CI/CD pipeline
  # Get this from your Instana account: Settings > Websites & Mobile Apps
  instana.eum.key: "CHANGE_ME_INSTANA_EUM_KEY"
  instana.eum.url: "https://eum.instana.io"

