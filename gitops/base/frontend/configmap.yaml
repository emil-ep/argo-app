apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  labels:
    app: frontend
    component: ui
data:
  # Backend NodePort URL — updated at install time by install.sh
  # to http://<NODE_IP>:30300 so the browser can reach the backend directly
  api.url: "http://localhost:30300"
  
  # Instana End User Monitoring (EUM) configuration
  # This key should be updated via kubectl or in your CI/CD pipeline
  # Get this from your Instana account: Settings > Websites & Mobile Apps
  instana.eum.key: "CHANGE_ME_INSTANA_EUM_KEY"
  instana.eum.url: "https://eum.instana.io"

